version: "3.9"

# Production deployments use Railway (backend) + Vercel (frontend).
# This file is for reference / self-hosted prod only.

services:
  api:
    image: ghcr.io/your-org/apex-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: ./backend/.env.production
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/your-org/apex-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: ./backend/.env.production
    command: celery -A workers.celery_app worker --loglevel=warning --concurrency 4
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
