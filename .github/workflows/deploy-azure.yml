name: Deploy — Azure

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: apexprodacr
  ACR_SERVER: apexprodacr.azurecr.io
  RESOURCE_GROUP: apex-prod-rg
  API_APP_NAME: apex-prod-api
  WORKER_APP_NAME: apex-prod-worker
  SWA_NAME: apex-prod-swa

jobs:
  build-push:
    name: Build & Push API image
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: tag
        run: echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      # az acr build runs the Docker build on ACR — no local Docker daemon needed
      - name: Build and push via ACR Tasks
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image apex-api:${{ steps.tag.outputs.image_tag }} \
            --image apex-api:latest \
            backend/

  deploy-api:
    name: Deploy API to Container Apps
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update API Container App
        run: |
          az containerapp update \
            --name $API_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_SERVER/apex-api:${{ needs.build-push.outputs.image_tag }}

      - name: Update Celery Worker Container App
        run: |
          az containerapp update \
            --name $WORKER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_SERVER/apex-api:${{ needs.build-push.outputs.image_tag }}

  deploy-frontend:
    name: Deploy Frontend to Static Web App
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SWA_TOKEN=$TOKEN" >> $GITHUB_ENV

      # AD credentials are SWA app settings (runtime), not build-time env vars
      - name: Configure SWA app settings
        run: |
          az staticwebapp appsettings set \
            --name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --setting-names \
              AZURE_AD_CLIENT_ID="${{ secrets.AZURE_AD_CLIENT_ID }}" \
              AZURE_AD_CLIENT_SECRET="${{ secrets.AZURE_AD_CLIENT_SECRET }}"

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: ""
        env:
          NEXT_PUBLIC_API_URL:             ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BRAND_NAME:          "Apex Business Award"
          NEXT_PUBLIC_BRAND_SHORT:         "Apex"
          NEXT_PUBLIC_BRAND_TAGLINE:       "Recognizing Excellence in Local Business"
          NEXT_PUBLIC_BRAND_CITY:          "Houston"
          NEXT_PUBLIC_BRAND_YEAR:          "2026"
          NEXT_PUBLIC_BRAND_COLOR_PRIMARY: "#1B2B4B"
          NEXT_PUBLIC_BRAND_COLOR_ACCENT:  "#C9A84C"
