name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ["feature/*", "hotfix/*"]

jobs:
  terraform-test:
    name: Terraform tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Test
        working-directory: terraform
        run: terraform test

  branch-policy:
    name: Branch naming policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce feature/* branch convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "PR source branch: $BRANCH"
          if [[ "$BRANCH" =~ ^(feature|hotfix)/ ]]; then
            echo "Branch name OK"
          else
            echo "ERROR: Branch '$BRANCH' does not match required pattern."
            echo "Use feature/* or hotfix/*"
            exit 1
          fi

  backend-lint:
    name: Backend — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt black ruff mypy

      - name: Black format check
        run: black --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy app --ignore-missing-imports

  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apex
          POSTGRES_PASSWORD: apex
          POSTGRES_DB: apex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://apex:apex@localhost:5432/apex_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_BRAND_NAME: "Apex Business Award"
          NEXT_PUBLIC_BRAND_SHORT: "Apex"
          NEXT_PUBLIC_BRAND_TAGLINE: "Recognizing Excellence in Local Business"
          NEXT_PUBLIC_BRAND_CITY: "Houston"
          NEXT_PUBLIC_BRAND_YEAR: "2026"
          NEXT_PUBLIC_BRAND_COLOR_PRIMARY: "#1B2B4B"
          NEXT_PUBLIC_BRAND_COLOR_ACCENT: "#C9A84C"
