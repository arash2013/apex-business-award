name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Get the latest semver tag (vMAJOR.MINOR.PATCH); default to v0.0.0
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            # Bump patch
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "prev=$LATEST"  >> $GITHUB_OUTPUT
          echo "Next release: $NEXT (was $LATEST)"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.prev }}"
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD"
          else
            RANGE="HEAD"
          fi

          FEATURES=$(git log $RANGE --pretty=format:"- %s" --grep="^feat" | head -50)
          FIXES=$(git log $RANGE --pretty=format:"- %s" --grep="^fix" | head -50)
          CHORES=$(git log $RANGE --pretty=format:"- %s" --grep="^chore\|^refactor\|^docs" | head -50)

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## What's New\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$CHORES" ]; then
            BODY="${BODY}## Maintenance\n${CHORES}\n\n"
          fi
          if [ -z "$BODY" ]; then
            BODY="See commit history for changes in this release."
          fi

          printf "%b" "$BODY" > changelog.md

      - name: Tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: changelog.md
          make_latest: true
